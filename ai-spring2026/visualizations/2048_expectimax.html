<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 Expectimax Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Sora:wght@300;400;600;700&display=swap');

  :root {
    --bg:        #1a1a2e;
    --surface:   #16213e;
    --surface2:  #0f3460;
    --text:      #e2e8f0;
    --text-dim:  #64748b;
    --accent:    #e94560;
    --accent2:   #f5a623;
    --best-glow: 0 0 18px rgba(233,69,96,0.45);
  }

  /* ── tile colours (classic 2048 palette) ── */
  .t2   { background:#cdc1b4; color:#776e65; }
  .t4   { background:#eee4da; color:#776e65; }
  .t8   { background:#f2b179; color:#f9f6f2; }
  .t16  { background:#f59563; color:#f9f6f2; }
  .t32  { background:#f67c5f; color:#f9f6f2; }
  .t64  { background:#f65e3b; color:#f9f6f2; }
  .t128 { background:#edcf72; color:#f9f6f2; }
  .t256 { background:#edcc61; color:#f9f6f2; }
  .t512 { background:#edc850; color:#f9f6f2; }
  .t1024{ background:#edc53f; color:#f9f6f2; font-size:.78em; }
  .t2048{ background:#edc22e; color:#f9f6f2; font-size:.78em; }
  .t0   { background:#cdc1b4; color:transparent; }   /* empty */

  * { box-sizing:border-box; margin:0; padding:0; }

  body {
    font-family:'Sora', sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:24px 16px;
  }

  /* ── header ── */
  header {
    text-align:center;
    margin-bottom:18px;
  }
  header h1 {
    font-size:1.45rem;
    font-weight:700;
    letter-spacing:-.02em;
  }
  header p {
    font-size:.82rem;
    color:var(--text-dim);
    margin-top:4px;
  }

  /* ── layout ── */
  .layout {
    max-width:960px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
  }

  /* ── main board ── */
  .main-board-wrap {
    display:flex;
    align-items:center;
    gap:24px;
  }
  .board {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
    background:var(--surface2);
    border-radius:10px;
    padding:8px;
  }
  .board .cell {
    width:64px; height:64px;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:1.3rem;
    transition:background .15s;
  }
  /* smaller boards in the tree */
  .board.sm .cell { width:34px; height:34px; font-size:.68rem; gap:3px; }
  .board.sm { gap:3px; padding:4px; border-radius:6px; }
  .board.xs .cell { width:26px; height:26px; font-size:.55rem; }
  .board.xs { gap:2px; padding:3px; border-radius:5px; }

  /* ── swipe buttons ── */
  .swipe-btns {
    display:flex;
    flex-direction:column;
    gap:4px;
    align-items:center;
  }
  .swipe-btns button {
    width:44px; height:44px;
    border:none;
    border-radius:8px;
    background:var(--surface2);
    color:var(--text);
    font-size:1.3rem;
    cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .swipe-btns button:hover { background:#1a4a7a; transform:scale(1.08); }
  .swipe-btns .row { display:flex; gap:4px; }

  /* ── info bar ── */
  .info-bar {
    display:flex;
    gap:24px;
    font-size:.82rem;
    color:var(--text-dim);
    align-items:center;
  }
  .info-bar .score { color:var(--text); font-weight:600; }
  .info-bar button {
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:6px;
    padding:5px 14px;
    font-size:.82rem;
    font-family:'Sora',sans-serif;
    cursor:pointer;
    transition:filter .15s;
  }
  .info-bar button:hover { filter:brightness(1.15); }

  /* ── tree panel ── */
  .tree-panel {
    width:100%;
    max-width:960px;
  }
  .tree-header {
    font-size:.82rem;
    color:var(--text-dim);
    margin-bottom:10px;
    text-align:center;
  }
  .directions {
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
  }

  /* ── one direction column ── */
  .dir-col {
    background:var(--surface);
    border-radius:10px;
    padding:10px;
    width:210px;
    text-align:center;
    transition:box-shadow .2s;
    cursor:pointer;
    position:relative;
  }
  .dir-col.best {
    box-shadow: 0 0 0 2px var(--accent), var(--best-glow);
  }
  .dir-col.illegal { opacity:.35; pointer-events:none; }

  .dir-col .dir-head {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-bottom:8px;
  }
  .dir-col .arrow { font-size:1.4rem; }
  .dir-col .ev-label {
    font-family:'IBM Plex Mono',monospace;
    font-size:.88rem;
    font-weight:600;
    color:var(--accent2);
  }
  .dir-col.best .ev-label { color:var(--accent); }
  .dir-col .best-badge {
    position:absolute;
    top:6px; right:8px;
    font-size:.62rem;
    font-weight:700;
    color:#fff;
    background:var(--accent);
    border-radius:4px;
    padding:1px 5px;
    text-transform:uppercase;
    letter-spacing:.04em;
  }

  /* post-swipe board */
  .dir-col .post-board { margin:0 auto 8px; }

  /* spawn outcomes */
  .dir-col .spawns {
    display:none;
    flex-wrap:wrap;
    gap:6px;
    justify-content:center;
    margin-top:6px;
  }
  .dir-col.open .spawns { display:flex; }

  .spawn-item {
    background:var(--surface2);
    border-radius:6px;
    padding:5px;
    text-align:center;
    cursor:pointer;
    transition:box-shadow .15s;
  }
  .spawn-item:hover { box-shadow: 0 0 0 1px var(--accent2); }
  .spawn-item .spawn-meta {
    font-size:.58rem;
    color:var(--text-dim);
    margin-bottom:3px;
    font-family:'IBM Plex Mono',monospace;
  }
  .spawn-item .spawn-eval {
    font-size:.7rem;
    font-weight:600;
    color:var(--accent2);
    font-family:'IBM Plex Mono',monospace;
    margin-top:2px;
  }

  /* toggle hint */
  .dir-col .toggle-hint {
    font-size:.6rem;
    color:var(--text-dim);
    margin-top:4px;
  }

  /* ── eval legend ── */
  .legend {
    font-size:.72rem;
    color:var(--text-dim);
    text-align:center;
    max-width:600px;
    line-height:1.5;
  }
  .legend code {
    font-family:'IBM Plex Mono',monospace;
    background:var(--surface2);
    padding:1px 5px;
    border-radius:3px;
    font-size:.88em;
  }
</style>
</head>
<body>

<header>
  <h1>2048 Expectimax Explorer</h1>
  <p>See exactly what the AI sees — every spawn outcome, every expected value</p>
</header>

<div class="layout">
  <!-- main board + swipe buttons -->
  <div class="main-board-wrap">
    <div class="board" id="mainBoard"></div>
    <div class="swipe-btns">
                    <button data-dir="up">↑</button>
      <div class="row">
        <button data-dir="left">←</button>
        <button data-dir="down">↓</button>
        <button data-dir="right">→</button>
      </div>
    </div>
  </div>

  <!-- info bar -->
  <div class="info-bar">
    <span>Score: <span class="score" id="scoreEl">0</span></span>
    <button id="playBestBtn">▶ Play best move</button>
    <button id="resetBtn">↺ Reset</button>
  </div>

  <!-- tree panel -->
  <div class="tree-panel">
    <div class="tree-header">Click a direction to expand its spawn outcomes</div>
    <div class="directions" id="directionsEl"></div>
  </div>

  <!-- legend -->
  <div class="legend">
    <strong>Eval</strong> = <code>tile sum</code> + <code>12 × empty cells</code> + <code>8 × mergeable pairs</code><br>
    Each spawn: <code>prob = (0.9 or 0.1) × (1 / empty cells)</code>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════════ -->
<script>
// ── 2048 game logic ──────────────────────────────────────────────────

function cloneBoard(b){ return b.map(r => [...r]); }

function swipeRow(row){
  // shift left, merge, shift left
  let tiles = row.filter(x => x !== 0);
  let merged = [];
  let score = 0;
  for(let i=0; i<tiles.length; ){
    if(i+1 < tiles.length && tiles[i] === tiles[i+1]){
      merged.push(tiles[i]*2);
      score += tiles[i]*2;
      i += 2;
    } else {
      merged.push(tiles[i]);
      i++;
    }
  }
  while(merged.length < 4) merged.push(0);
  return { row: merged, score };
}

function swipe(board, dir){
  // normalise so we always swipe-left on rows, then rotate back
  let b = cloneBoard(board);
  let totalScore = 0;

  if(dir === 'right'){
    b = b.map(r => [...r].reverse());
  } else if(dir === 'up'){
    b = transpose(b);
  } else if(dir === 'down'){
    b = transpose(b).map(r => [...r].reverse());
  }

  b = b.map(r => {
    let res = swipeRow(r);
    totalScore += res.score;
    return res.row;
  });

  if(dir === 'right'){
    b = b.map(r => [...r].reverse());
  } else if(dir === 'up'){
    b = transpose(b);
  } else if(dir === 'down'){
    b = b.map(r => [...r].reverse());
    b = transpose(b);
  }

  return { board: b, score: totalScore };
}

function transpose(b){
  return b[0].map((_,i) => b.map(r => r[i]));
}

function boardsEqual(a, b){
  return JSON.stringify(a) === JSON.stringify(b);
}

function emptyCells(board){
  let cells = [];
  board.forEach((row,r) => row.forEach((v,c) => { if(v===0) cells.push([r,c]); }));
  return cells;
}

// ── eval heuristic ───────────────────────────────────────────────────
function evaluate(board){
  let sum = 0, empties = 0, merges = 0;
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    let v = board[r][c];
    sum += v;
    if(v === 0) empties++;
    // check right and down neighbour for merge
    if(c<3 && board[r][c] === board[r][c+1] && v > 0) merges++;
    if(r<3 && board[r][c] === board[r+1][c] && v > 0) merges++;
  }
  return sum + 12*empties + 8*merges;
}

// ── spawn a random tile (for "play best move") ──────────────────────
function spawnRandom(board){
  let cells = emptyCells(board);
  if(cells.length === 0) return board;
  let [r,c] = cells[Math.floor(Math.random()*cells.length)];
  let b = cloneBoard(board);
  b[r][c] = Math.random() < 0.9 ? 2 : 4;
  return b;
}

// ── depth-1 expectimax ───────────────────────────────────────────────
function computeTree(board){
  const dirs = ['left','up','down','right'];
  const arrows = { left:'←', up:'↑', down:'↓', right:'→' };
  let results = [];

  dirs.forEach(dir => {
    let { board: swipped, score: moveScore } = swipe(board, dir);
    let illegal = boardsEqual(swipped, board);
    if(illegal){
      results.push({ dir, arrow: arrows[dir], illegal:true, ev:null, spawns:[] });
      return;
    }
    let cells = emptyCells(swipped);
    let spawns = [];
    let ev = 0;
    cells.forEach(([r,c]) => {
      [2,4].forEach(tile => {
        let b = cloneBoard(swipped);
        b[r][c] = tile;
        let prob = (tile===2 ? 0.9 : 0.1) / cells.length;
        let val = evaluate(b);
        ev += prob * val;
        spawns.push({ board:b, tile, r, c, prob, eval:val });
      });
    });
    results.push({ dir, arrow: arrows[dir], illegal:false, ev, spawns, swipped, moveScore });
  });

  // find best
  let best = null;
  results.forEach(res => {
    if(!res.illegal && (best===null || res.ev > best.ev)) best = res;
  });
  if(best) best.isBest = true;

  return results;
}

// ── rendering ────────────────────────────────────────────────────────
function renderBoard(container, board, sizeClass=''){
  container.innerHTML = '';
  container.className = 'board ' + sizeClass;
  board.forEach(row => row.forEach(val => {
    let cell = document.createElement('div');
    cell.className = 'cell t' + val;
    cell.textContent = val || '';
    container.appendChild(cell);
  }));
}

let openDir = null;   // which dir column is expanded

function renderTree(board){
  let tree = computeTree(board);
  let el = document.getElementById('directionsEl');
  el.innerHTML = '';

  tree.forEach(res => {
    let col = document.createElement('div');
    col.className = 'dir-col' + (res.illegal?' illegal':'') + (res.isBest?' best':'') + (openDir===res.dir?' open':'');
    col.onclick = () => {
      if(res.illegal) return;
      openDir = (openDir === res.dir) ? null : res.dir;
      renderTree(board);   // re-render to toggle
    };

    // best badge
    if(res.isBest){
      let badge = document.createElement('div');
      badge.className = 'best-badge';
      badge.textContent = 'best';
      col.appendChild(badge);
    }

    // header: arrow + EV
    let head = document.createElement('div');
    head.className = 'dir-head';
    head.innerHTML = `<span class="arrow">${res.arrow}</span>
                      <span class="ev-label">${res.illegal ? '—' : 'EV = '+res.ev.toFixed(1)}</span>`;
    col.appendChild(head);

    if(!res.illegal){
      // post-swipe board
      let postWrap = document.createElement('div');
      postWrap.className = 'post-board';
      let postBoard = document.createElement('div');
      renderBoard(postBoard, res.swipped, 'sm');
      postWrap.appendChild(postBoard);
      col.appendChild(postWrap);

      // spawns container
      let spawnsEl = document.createElement('div');
      spawnsEl.className = 'spawns';

      res.spawns.forEach(sp => {
        let item = document.createElement('div');
        item.className = 'spawn-item';
        item.onclick = (e) => {
          e.stopPropagation();
          // play this specific outcome
          gameState.board = sp.board;
          gameState.score += res.moveScore;
          update();
        };

        let meta = document.createElement('div');
        meta.className = 'spawn-meta';
        meta.textContent = `${sp.tile} @ (${sp.r},${sp.c})  p=${sp.prob.toFixed(3)}`;
        item.appendChild(meta);

        let brd = document.createElement('div');
        renderBoard(brd, sp.board, 'xs');
        item.appendChild(brd);

        let evalEl = document.createElement('div');
        evalEl.className = 'spawn-eval';
        evalEl.textContent = 'eval = ' + sp.eval;
        item.appendChild(evalEl);

        spawnsEl.appendChild(item);
      });

      col.appendChild(spawnsEl);

      // toggle hint
      let hint = document.createElement('div');
      hint.className = 'toggle-hint';
      hint.textContent = openDir===res.dir ? '▲ click to collapse' : '▼ click to expand spawns';
      col.appendChild(hint);
    }

    el.appendChild(col);
  });

  return tree;   // return so playBest can use it
}

// ── game state ───────────────────────────────────────────────────────
let gameState = {
  board: [
    [2, 4, 2, 4],
    [4, 2, 4, 2],
    [2, 4, 4, 8],
    [4, 2, 0, 8],
  ],
  score: 0
};

const INITIAL_BOARD = gameState.board.map(r=>[...r]);

function update(){
  renderBoard(document.getElementById('mainBoard'), gameState.board);
  document.getElementById('scoreEl').textContent = gameState.score;
  renderTree(gameState.board);
}

// ── event wiring ─────────────────────────────────────────────────────
document.querySelectorAll('.swipe-btns button').forEach(btn => {
  btn.addEventListener('click', () => {
    let dir = btn.dataset.dir;
    let { board: newBoard, score } = swipe(gameState.board, dir);
    if(boardsEqual(newBoard, gameState.board)) return;   // illegal
    gameState.board = spawnRandom(newBoard);
    gameState.score += score;
    update();
  });
});

document.getElementById('playBestBtn').addEventListener('click', () => {
  let tree = computeTree(gameState.board);
  let best = tree.find(r => r.isBest);
  if(!best) return;
  gameState.board = spawnRandom(best.swipped);
  gameState.score += best.moveScore;
  update();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  gameState.board = INITIAL_BOARD.map(r=>[...r]);
  gameState.score = 0;
  openDir = null;
  update();
});

// keyboard arrows
document.addEventListener('keydown', e => {
  let map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
  if(!map[e.key]) return;
  e.preventDefault();
  let dir = map[e.key];
  let { board: newBoard, score } = swipe(gameState.board, dir);
  if(boardsEqual(newBoard, gameState.board)) return;
  gameState.board = spawnRandom(newBoard);
  gameState.score += score;
  update();
});

// ── init ─────────────────────────────────────────────────────────────
update();
</script>
</body>
</html>
